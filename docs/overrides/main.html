<script>
  (function() {
    // Keep header title as sweet_tea — Material swaps it to the nav label on scroll
    function fixHomeTitle() {
      document.querySelectorAll('.md-header__topic .md-ellipsis').forEach(function(el) {
        if (el.textContent.trim() === 'Home') el.textContent = 'sweet_tea';
      });
    }
    fixHomeTitle();
    var observer = new MutationObserver(fixHomeTitle);
    document.querySelectorAll('.md-header__topic').forEach(function(el) {
      observer.observe(el, { childList: true, subtree: true, characterData: true });
    });

    // Mark active bottom nav item based on current path
    var path = window.location.pathname;
    document.querySelectorAll('.st-bottom-nav__item[data-path]').forEach(function(el) {
      var p = el.getAttribute('data-path');
      if ((p === '' && (path.endsWith('/sweet_tea/') || path.endsWith('/sweet_tea/index.html'))) ||
          (p !== '' && path.includes('/' + p + '/'))) {
        el.classList.add('st-bottom-nav__item--active');
      }
    });
  })();
</script>
