version: '1.0'
repository:
  type: single-language
  mappings: {}
spec:
  language: html
  runtime: '3.14'
  package_manager: uv
  test_framework: pytest
  linter: htmlhint
  linters:
    - ruff
  formatter: Prettier
  coverage:
    line: 80
    branch: 70
    function: 90
    statement: 85
    mutation: 80
    path: 60
  repo_type: single-language
  version: HTML5
variant: verbose
active_personas:
  - frontend_software_engineer
  - architect
  - qa_tester
  - devops_engineer
  - security_engineer
  - technical_writer
