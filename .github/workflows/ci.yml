name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run tests with coverage
        run: uv run pytest --cov=sweet_tea --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-and-test-package:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install build dependencies
        run: uv sync --dev

      - name: Build package
        run: uv build

      - name: Test package installation
        run: |
          # Create a temporary directory for testing
          mkdir test_install
          cd test_install

          # Install the built package
          uv pip install ../dist/*.whl

          # Test import
          uv run python -c "import sweet_tea; print('Package installed successfully!')"

          # Test basic functionality
          uv run python -c "
          from sweet_tea import Registry, Factory
          class TestClass:
              def __init__(self, value='test'): self.value = value
          Registry.register('test', TestClass)
          instance = Factory.create('test')
          print(f'Factory works: {instance.value}')
          "

  publish:
    runs-on: ubuntu-latest
    needs: [test, build-and-test-package]
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install build dependencies
        run: uv sync --dev

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish --token $UV_PUBLISH_TOKEN
